[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log

[program:projectA]
command=python -m uvicorn src.main:app --host 0.0.0.0 --port 5000
directory=/app/projectA
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/projectA.out.log
stderr_logfile=/var/log/supervisor/projectA.err.log

[program:projectB]
command=uvicorn VLMMain:app --host 0.0.0.0 --port 8000
directory=/app/projectB
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/projectB.out.log
stderr_logfile=/var/log/supervisor/projectB.err.log